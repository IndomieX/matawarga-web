<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin - MataWarga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand glass-nav sticky-top py-3 mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold fs-4">
                <i class="fas fa-shield-alt text-primary me-2"></i>Dashboard RT/RW
            </span>
            <button id="btnLogoutAdmin" class="btn btn-danger btn-sm fw-bold px-3 shadow-sm" style="border-radius: 10px;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="card-custom p-4 mb-5">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                <h4 class="mb-0 fw-bold">Rekapitulasi Laporan</h4>
                <div class="d-flex gap-2">
                    <button class="btn btn-danger btn-sm fw-bold shadow-sm px-3" style="border-radius: 10px; padding: 10px 15px;" id="btnCetakPDF">
                        <i class="fas fa-file-pdf me-1"></i> Cetak PDF
                    </button>
                    <button class="btn btn-success btn-sm fw-bold shadow-sm px-3" style="border-radius: 10px; padding: 10px 15px;" id="btnRefresh">
                        <i class="fas fa-sync-alt me-1"></i> Refresh
                    </button>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="tabelLaporan">
                    <thead class="table-light">
                        <tr>
                            <th class="px-3 py-3 rounded-start">No</th>
                            <th class="py-3">Foto</th>
                            <th class="py-3">Judul Laporan</th>
                            <th class="py-3">Kategori</th>
                            <th class="py-3">Lokasi</th>
                            <th class="py-3">Status</th>
                            <th class="text-center aksi-kolom py-3 rounded-end">Aksi (Update/Hapus)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/admin-script.js"></script>
</body>
</html>
