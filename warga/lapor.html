<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Laporan - MataWarga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand glass-nav sticky-top py-3 mb-4">
        <div class="container">
            <a href="beranda.html" class="text-primary text-decoration-none fs-4 me-3"><i class="fas fa-arrow-left"></i></a>
            <span class="navbar-brand fw-bold fs-4 mb-0">Buat Laporan</span>
        </div>
    </nav>

    <div class="container mb-5" style="max-width: 700px;">
        <div class="card-custom p-4 p-md-5">
            <form id="formLapor">
                <div class="mb-4">
                    <label class="form-label fw-bold ms-1">Judul Laporan</label>
                    <input type="text" id="t" class="form-control input-custom" placeholder="Contoh: Jalan berlubang" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold ms-1">Kategori</label>
                    <select id="k" class="form-select input-custom" required>
                        <option value="" selected disabled>Pilih Kategori...</option>
                        <option value="Jalan & Akses">Jalan & Akses</option>
                        <option value="Sampah">Sampah</option>
                        <option value="Drainase">Drainase</option>
                        <option value="Fasilitas Umum">Fasilitas Umum</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold ms-1">Titik Lokasi (Geser Pin Merah)</label>
                    <div id="mapPicker" style="height: 250px; border-radius: 14px; border: 2px solid #cbd5e1; z-index: 1;"></div>
                    <small class="text-muted ms-1 mt-1 d-block"><i class="fas fa-info-circle"></i> Klik atau geser pin ke lokasi kejadian.</small>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold ms-1">Detail Lokasi (Patokan)</label>
                    <input type="text" id="l" class="form-control input-custom" placeholder="Nama jalan, RT/RW, atau patokan..." required>
                </div>
                <div class="mb-5">
                    <label class="form-label fw-bold ms-1">Foto Bukti</label>
                    <div class="input-custom text-center py-5" style="border: 2px dashed #cbd5e1; cursor: pointer; background: #f8fafc;" onclick="document.getElementById('f').click()">
                        <i class="fas fa-camera fa-3x text-muted mb-2"></i>
                        <p class="mb-0 text-muted fw-medium" id="fileName">Klik untuk unggah foto</p>
                    </div>
                    <input type="file" id="f" class="d-none" accept="image/*" required onchange="document.getElementById('fileName').textContent = this.files[0] ? this.files[0].name : 'Klik untuk unggah foto'">
                </div>
                
                <button type="submit" class="btn btn-primary-custom btn-custom w-100 fs-5" id="s">Kirim Laporan</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/lapor-script.js"></script>
</body>
</html>
