<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Beranda - MataWarga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand glass-nav sticky-top py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand fw-bold fs-4 mb-0">
                <i class="fas fa-layer-group text-primary me-2"></i>MataWarga
            </span>
            <div class="d-flex gap-4 align-items-center">
                <a href="beranda.html" class="text-primary text-decoration-none fw-bold"><i class="fas fa-home me-1"></i> Beranda</a>
                <a href="peta.html" class="text-muted text-decoration-none fw-bold hover-primary"><i class="fas fa-map-marked-alt me-1"></i> Peta</a>
                <a href="profil.html" class="text-muted text-decoration-none fw-bold hover-primary"><i class="fas fa-user me-1"></i> Profil</a>
            </div>
        </div>
    </nav>

    <a href="lapor.html" class="btn btn-primary-custom rounded-circle shadow-lg d-flex align-items-center justify-content-center" style="position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; z-index: 1000;">
        <i class="fas fa-plus fs-3"></i>
    </a>

    <div class="container mt-5 mb-5">
        <div class="card-custom p-4 mb-5 border-start border-primary border-5">
            <h4 class="fw-bold mb-1">Halo, <span id="userName" class="text-primary">Warga</span>! 👋</h4>
            <p class="text-muted mb-0 fw-medium">Terdaftar di wilayah: <span class="badge bg-primary-subtle text-primary border border-primary-subtle">RT <span id="userRT">--</span> / RW <span id="userRW">--</span></span></p>
        </div>
        
        <div class="mb-4">
            <h5 class="fw-bold"><i class="fas fa-stream me-2 text-primary"></i>Laporan Warga Sekitar</h5>
        </div>
        
        <div class="row g-4" id="feedWarga">
            </div>
    </div>
    <script type="module" src="js/beranda-script.js"></script>
</body>
</html>
