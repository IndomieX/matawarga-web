<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil - MataWarga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand glass-nav sticky-top py-3 mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand fw-bold fs-4 mb-0">
                <i class="fas fa-layer-group text-primary me-2"></i>MataWarga
            </span>
            <div class="d-flex gap-4 align-items-center">
                <a href="beranda.html" class="text-muted text-decoration-none fw-bold hover-primary"><i class="fas fa-home me-1"></i> Beranda</a>
                <a href="peta.html" class="text-muted text-decoration-none fw-bold hover-primary"><i class="fas fa-map-marked-alt me-1"></i> Peta</a>
                <a href="profil.html" class="text-primary text-decoration-none fw-bold"><i class="fas fa-user me-1"></i> Profil</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5" style="max-width: 500px;">
        <div class="card-custom p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow-sm" style="width: 100px; height: 100px;">
                    <i class="fas fa-user-circle fa-4x"></i>
                </div>
                
                <h3 class="fw-bold mb-1 text-dark" id="profilNama">Memuat nama...</h3>
                <p class="text-muted fw-medium mb-3" id="profilEmail">Memuat email...</p>
                
                <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-4 py-2 rounded-pill fs-6 shadow-sm">
                    <i class="fas fa-map-marker-alt me-1"></i> Warga RT <span id="profilRT">--</span> / RW <span id="profilRW">--</span>
                </span>
            </div>
            
            <hr class="my-4" style="opacity: 0.1;">
            
            <div class="mb-4">
                <h6 class="fw-bold text-muted mb-3 ms-1">Detail Sistem</h6>
                <div class="d-flex align-items-center p-3 bg-light rounded-4 border">
                    <div class="bg-white p-2 rounded-circle shadow-sm me-3 d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                        <i class="fas fa-id-badge text-primary fs-5"></i>
                    </div>
                    <div>
                        <p class="mb-0 text-muted small fw-bold">Status Akun</p>
                        <p class="mb-0 fw-bold text-success"><i class="fas fa-check-circle me-1"></i>Aktif & Terverifikasi</p>
                    </div>
                </div>
            </div>

            <button class="btn btn-outline-primary w-100 fw-bold py-3 shadow-sm mb-3" style="border-radius: 14px;" data-bs-toggle="modal" data-bs-target="#modalEdit">
                <i class="fas fa-user-edit me-2"></i> Edit Profil
            </button>
            
            <button class="btn btn-danger w-100 fw-bold py-3 shadow-sm" style="border-radius: 14px;" id="btnLogout">
                <i class="fas fa-sign-out-alt me-2"></i> Keluar dari Sistem
            </button>
        </div>
    </div>

    <div class="modal fade" id="modalEdit" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 20px; border: none;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-primary"><i class="fas fa-user-edit me-2"></i>Update Profil</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formEditProfil">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted">Nama Lengkap</label>
                            <input type="text" class="form-control input-custom" id="editNama" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted">Email Pengguna</label>
                            <input type="email" class="form-control input-custom" id="editEmail" required>
                            <small class="text-warning fw-bold" style="font-size: 11px;">*Mengubah email mungkin akan membuat Anda ter-logout.</small>
                        </div>
                        <div class="row mb-4">
                            <div class="col-6">
                                <label class="form-label fw-bold small text-muted">Pilih RT</label>
                                <select class="form-select input-custom" id="editRT" required>
                                    <option value="05">RT 05</option>
                                    <option value="11">RT 11</option>
                                    <option value="12">RT 12</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-bold small text-muted">Pilih RW</label>
                                <select class="form-select input-custom" id="editRW" required>
                                    <option value="06">RW 06</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100 fw-bold py-2" id="btnSimpanEdit">Simpan Perubahan</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/profil-script.js"></script>
</body>
</html>
