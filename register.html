<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - MataWarga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5 pt-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card-custom p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
                            <i class="fas fa-user-plus fa-2x"></i>
                        </div>
                        <h3 class="fw-bold text-primary">Daftar Akun</h3>
                        <p class="text-muted fw-medium">Lengkapi data diri wilayah Anda</p>
                    </div>
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold ms-1">Nama Lengkap</label>
                            <input type="text" class="form-control input-custom" id="regNama" placeholder="Contoh: Daniswara" required>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label fw-bold ms-1">Pilih RT</label>
                                <select class="form-select input-custom" id="regRT" required>
                                    <option value="" selected disabled>Pilih RT...</option>
                                    <option value="05">RT 05</option>
                                    <option value="11">RT 11</option>
                                    <option value="12">RT 12</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-bold ms-1">Pilih RW</label>
                                <select class="form-select input-custom" id="regRW" required>
                                    <option value="06">RW 06</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold ms-1">Email</label>
                            <input type="email" class="form-control input-custom" id="regEmail" placeholder="contoh@gmail.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold ms-1">Password</label>
                            <input type="password" class="form-control input-custom" id="regPassword" placeholder="Min. 6 Karakter" required>
                        </div>
                        <button type="submit" class="btn btn-primary-custom btn-custom w-100" id="btnReg">Daftar Sekarang</button>
                    </form>
                    <div class="text-center mt-4">
                        <span class="text-muted fw-medium">Sudah punya akun? <a href="index.html" class="text-primary fw-bold text-decoration-none">Login</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/register-script.js"></script>
</body>
</html>
