<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MataWarga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"> </head>
<body>
    <div class="container mt-5 pt-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card-custom p-4 p-md-5"> 
                    <div class="text-center mb-5">
                        <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
                            <i class="fas fa-shield-alt fa-2x"></i>
                        </div>
                        <h2 class="fw-bold text-primary mb-1">MataWarga</h2>
                        <p class="text-muted fw-medium">Layanan Pelaporan Cepat RT/RW</p>
                    </div>
                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="form-label fw-bold ms-1">Email Pengguna</label>
                            <input type="email" class="form-control input-custom" id="loginEmail" placeholder="nama@email.com" required>
                        </div>
                        <div class="mb-5">
                            <label class="form-label fw-bold ms-1">Kata Sandi</label>
                            <input type="password" class="form-control input-custom" id="loginPassword" placeholder="Masukkan kata sandi" required>
                        </div>
                        <button type="submit" class="btn btn-primary-custom btn-custom w-100" id="btnLogin">Masuk ke Sistem</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <span class="text-muted fw-medium">Belum punya akun? <a href="register.html" class="text-primary text-decoration-none fw-bold">Daftar di sini</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/login-script.js"></script>
</body>
</html>
